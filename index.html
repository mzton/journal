<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Ledger — a simple trading journal for tracking entries, exits, PnL, and risk:reward." />
    <title>Ledger — Trading Journal</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <script>
      // Applies the user's saved theme before React mounts, so there's no
      // flash of the wrong theme on load. Must read the same localStorage
      // key as STORAGE_KEYS.themePreference in src/utils/storage.ts.
      (function () {
        try {
          var raw = localStorage.getItem('tj_theme_preference');
          var preference = raw ? JSON.parse(raw) : 'system';
          var resolved =
            preference === 'system'
              ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
              : preference;
          document.documentElement.dataset.theme = resolved;
        } catch (error) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
